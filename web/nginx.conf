worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 8192;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  reset_timedout_connection on;
  server_tokens off;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Cache for static assets
  map $sent_http_content_type $expires {
    default                   off;
    text/html                 epoch;
    text/css                  max;
    application/javascript    max;
    ~image/                   30d;
    ~font/                    max;
  }

  upstream api_upstream {
    server api:4000;
    keepalive 64;
  }

  log_format perf '$remote_addr - $request_time - "$request" $status $bytes_sent';

  server {
    listen 80 default_server reuseport;
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Long-cache hashed assets but we don't hash — use moderate cache + revalidation
    location ~* \.(?:css|js)$ {
      expires 1d;
      add_header Cache-Control "public, must-revalidate";
      try_files $uri =404;
    }
    location /assets/ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # API proxy
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering on;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
      client_max_body_size 10m;
    }

    # Admin route (clean URL)
    location = /admin {
      return 301 /admin.html$is_args$args;
    }
    location = /admin/ {
      return 301 /admin.html$is_args$args;
    }

    # SPA fallback for hash routes
    location / {
      add_header Cache-Control "no-cache";
      try_files $uri $uri/ /index.html;
    }

    # Healthcheck
    location = /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
