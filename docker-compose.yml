name: sss-food-world

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sss}
      POSTGRES_USER: ${POSTGRES_USER:-sss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sss_secret_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sss} -d ${POSTGRES_DB:-sss}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384m

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sss}:${POSTGRES_PASSWORD:-sss_secret_change_me}@postgres:5432/${POSTGRES_DB:-sss}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-replace-this-with-a-long-random-string}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@artisangroc.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      NODE_ENV: production
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  pgdata:
